<script type="module">
// ============================================================
// FIREBASE CONFIG
// ============================================================
const FIREBASE_CONFIG = {
  apiKey: "AIzaSyCkEvghL5ahKTYzVfkg-O7I0lw5ZqIXlgA",
  authDomain: "personal-quest-log.firebaseapp.com",
  projectId: "personal-quest-log",
  storageBucket: "personal-quest-log.firebasestorage.app",
  messagingSenderId: "610182809351",
  appId: "1:610182809351:web:bcc050f50dd095702fe7a2"
};
// ============================================================
const USE_FIREBASE = FIREBASE_CONFIG.apiKey !== "YOUR_API_KEY";
let db=null,auth=null,onSnap=null,unsub=null,currentUser=null,firestoreDoc=null,saveTimeout=null;
const PNUMS={critical:4,high:3,medium:2,low:1};
const PNAMES={critical:'Critical',high:'High',medium:'Medium',low:'Low'};
const PORDER={critical:0,high:1,medium:2,low:3};
const PCOL={critical:'critical',high:'high',medium:'medium',low:'low'};
function defState(){return{quests:[
  {id:1,name:'Q1 Quarterly Report',front:'Work',mission:'Management',content:'Prepare and submit the quarterly report before month end.\n\nIncludes data processing, comparative analysis, and internal review.',priority:'critical',due:'2026-05-15',done:false,objectives:[{t:'Collect data',d:true},{t:'Write analysis',d:false},{t:'Send for review',d:false}]},
  {id:2,name:'Committee Meeting — Housing Policy',front:'Work',mission:'Meetings',content:'Prepare materials and coordinate with all participants.',priority:'high',due:'2026-05-22',done:false,objectives:[{t:'Print presentation',d:false},{t:'Send invitations',d:true}]},
  {id:3,name:'Weekly Team Standup',front:'Work',mission:'Meetings',content:'',priority:'low',due:'',done:true,objectives:[]},
  {id:4,name:"Mom's Birthday",front:'Family',mission:'Events',content:'Buy a gift and book a table at the restaurant.',priority:'high',due:'2026-05-25',done:false,objectives:[{t:'Buy gift',d:false},{t:'Book restaurant',d:false}]},
  {id:5,name:'Schedule Doctor Appointment',front:'Health',mission:'Medical',content:'',priority:'high',due:'2026-05-20',done:false,objectives:[]},
  {id:6,name:'Renew Car Insurance',front:'Finance',mission:'Insurance',content:'Compare at least two quotes before committing.',priority:'medium',due:'2026-06-01',done:false,objectives:[]},
  {id:7,name:'Legal Consultation',front:'Finance',mission:'Legal',content:'Regarding the new rental agreement. Check cancellation and liability clauses.',priority:'medium',due:'',done:false,objectives:[]},
],fronts:['Work','Family','Health','Finance'],missions:['Management','Meetings','Events','Medical','Insurance','Legal','General'],nextId:8}}
let st=JSON.parse(localStorage.getItem('gol_v1')||'null')||defState();
let sel=null,showDone=false,formOpen=false,collapsed=new Set(),modalTab='fronts',drawerOpen=false;
window.toggleDone=toggleDone;window.toggleFront=toggleFront;window.selectQ=selectQ;
window.editField=editField;window.saveContent=saveContent;window.toggleComplete=toggleComplete;
window.toggleObj=toggleObj;window.delObj=delObj;window.addObj=addObj;window.delQ=delQ;
window.toggleForm=toggleForm;window.cancelForm=cancelForm;window.submitQuest=submitQuest;
window.openModal=openModal;window.closeModal=closeModal;window.switchTab=switchTab;
window.addItem=addItem;window.removeItem=removeItem;window.toggleDrawer=toggleDrawer;
window.closeDrawer=closeDrawer;window.goBack=goBack;
window.signInWithGoogle=signInWithGoogle;window.signOutUser=signOutUser;
function setSyncStatus(s,l){document.getElementById('sync-status').className='sync-status '+s;document.getElementById('sync-text').textContent=l}
function saveLocal(){localStorage.setItem('gol_v1',JSON.stringify(st))}
function save(){saveLocal();if(USE_FIREBASE&&firestoreDoc&&window._setDoc)pushToFirestore()}
async function initFirebase(){
  if(!USE_FIREBASE){setSyncStatus('local','Local');renderAuth();return}
  try{
    setSyncStatus('syncing','Connecting…');
    const {initializeApp}=await import('https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js');
    const fm=await import('https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js');
    const am=await import('https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js');
    const {getFirestore,doc,setDoc,onSnapshot}=fm;
    const {getAuth,GoogleAuthProvider,signInWithRedirect,getRedirectResult,signOut,onAuthStateChanged}=am;
    onSnap=onSnapshot;
    const app=initializeApp(FIREBASE_CONFIG);
    db=getFirestore(app);auth=getAuth(app);
    window._gp=new GoogleAuthProvider();
    window._signInWithRedirect=signInWithRedirect;
    window._signOut=signOut;window._doc=doc;window._setDoc=setDoc;
    try{await getRedirectResult(auth)}catch(e){console.warn('redirect:',e)}
    onAuthStateChanged(auth,user=>{
      currentUser=user;
      if(user){setSyncStatus('syncing','Syncing…');firestoreDoc=doc(db,'users',user.uid,'data','questlog');subscribeFS()}
      else{firestoreDoc=null;setSyncStatus('local','Local')}
      renderAuth();
    });
  }catch(e){console.warn('Firebase failed:',e);setSyncStatus('offline','Offline');renderAuth()}
}
function subscribeFS(){
  if(unsub)unsub();if(!firestoreDoc||!onSnap)return;
  setSyncStatus('syncing','Syncing…');
  unsub=onSnap(firestoreDoc,snap=>{
    if(snap.exists()){const d=snap.data();if(d&&d.state){st=d.state;saveLocal();render()}}
    else pushToFirestore();
    setSyncStatus('synced','Synced');
  },err=>{console.warn(err);setSyncStatus('offline','Offline')});
}
function pushToFirestore(){
  if(!firestoreDoc||!window._setDoc)return;
  if(saveTimeout)clearTimeout(saveTimeout);
  saveTimeout=setTimeout(async()=>{
    try{setSyncStatus('syncing','Saving…');await window._setDoc(firestoreDoc,{state:st},{merge:false});setSyncStatus('synced','Synced')}
    catch(e){console.warn(e);setSyncStatus('offline','Offline')}
  },600);
}
function renderAuth(){
  const area=document.getElementById('auth-area');
  if(!USE_FIREBASE){area.innerHTML='';return}
  const user=currentUser;
  if(!user){area.innerHTML=`<button class="btn-auth google" onclick="signInWithGoogle()">Sign in with Google</button>`;return}
  const photo=user.photoURL?`<img class="auth-avatar" src="${user.photoURL}" alt="">`:'';
  const name=user.displayName||user.email||'User';
  area.innerHTML=`<div class="auth-user">${photo}<span class="auth-name" title="${name}">${name}</span></div><button class="btn-auth signout" onclick="signOutUser()">Sign Out</button>`;
}
async function signInWithGoogle(){if(!auth||!window._gp)return;try{setSyncStatus('syncing','Signing in…');await window._signInWithRedirect(auth,window._gp)}catch(e){setSyncStatus('offline','Error')}}
async function signOutUser(){
  if(!auth||!window._signOut)return;
  try{if(unsub){unsub();unsub=null}await window._signOut(auth);currentUser=null;firestoreDoc=null;setSyncStatus('local','Local');renderAuth()}
  catch(e){console.warn(e)}
}
function toggleDrawer(){drawerOpen=!drawerOpen;document.getElementById('left-panel').classList.toggle('open',drawerOpen);document.getElementById('drawer-overlay').classList.toggle('active',drawerOpen)}
function closeDrawer(){drawerOpen=false;document.getElementById('left-panel').classList.remove('open');document.getElementById('drawer-overlay').classList.remove('active')}
function goBack(){sel=null;renderList();renderDetail();if(window.innerWidth<=767)toggleDrawer()}
function today(){return new Date().toISOString().split('T')[0]}
function daysUntil(d){if(!d)return null;return Math.round((new Date(d)-new Date(today()))/86400000)}
function fmt(d){if(!d)return '';const[y,m,day]=d.split('-');return`${day}.${m}.${y}`}
function esc(s){return s.replace(/\\/g,'\\\\').replace(/'/g,"\\'")}
function pipHtml(p,sz=7){const n=PNUMS[p]||1,c=PCOL[p];return Array.from({length:4},(_,i)=>`<div class="pip ${i<n?'on-'+c:'off'}" style="width:${sz}px;height:${sz}px"></div>`).join('')}
function toggleDone(){showDone=!showDone;document.getElementById('btnd').classList.toggle('on',showDone);render()}
function render(){save();renderGems();renderList();renderDetail();populateSelects()}
function renderGems(){
  const act=st.quests.filter(q=>!q.done).length,dn=st.quests.filter(q=>q.done).length,cr=st.quests.filter(q=>!q.done&&q.priority==='critical').length;
  document.getElementById('tgems').innerHTML=`<div class="topbar-gem">Active: <b>${act}</b></div>`+(cr?`<div class="topbar-gem crit">Critical: <b>${cr}</b></div>`:'')+`<div class="topbar-gem">Done: <b>${dn}</b></div>`;
}
function renderList(){
  const q=document.getElementById('srch').value.trim().toLowerCase();
  let vis=st.quests.filter(qst=>{if(!showDone&&qst.done)return false;if(q&&!qst.name.toLowerCase().includes(q)&&!(qst.front||'').toLowerCase().includes(q))return false;return true});
  const order=[];const byF={};
  for(const qst of vis){const f=qst.front||'General';if(!byF[f]){byF[f]=[];order.push(f)}byF[f].push(qst)}
  let h='';
  if(!order.length){h='<div style="color:var(--s4);font-style:italic;font-family:\'Crimson Pro\',serif;font-size:.95rem;padding:1.2rem;text-align:center">No quests found</div>'}
  else{for(const f of order){
    const isColl=collapsed.has(f);
    h+=`<div class="front-head${isColl?' coll':''}" onclick="toggleFront('${esc(f)}')"><span>${f}</span><span class="ch-arr">▾</span></div>`;
    if(!isColl){
      const sorted=byF[f].slice().sort((a,b)=>{if(a.done!==b.done)return a.done?1:-1;return(PORDER[a.priority]||2)-(PORDER[b.priority]||2)});
      for(const qst of sorted){
        const days=daysUntil(qst.due);let dueLine='';
        if(qst.due){let cls='',lbl='';if(days<0){cls='ov';lbl=`Overdue ${-days}d`}else if(days===0){cls='soon';lbl='Today!'}else if(days<=3){cls='soon';lbl=`${days} days`}else lbl=fmt(qst.due);dueLine=`<div class="qrow-due ${cls}">${lbl}</div>`}
        h+=`<div class="qrow${sel===qst.id?' sel':''}${qst.done?' done-r':''}" onclick="selectQ(${qst.id})"><div class="qrow-dot">${sel===qst.id?'►':'·'}</div><div class="qrow-info"><div class="qrow-name">${qst.name}</div>${dueLine}</div><div class="qrow-right"><div class="pips">${pipHtml(qst.priority,7)}</div></div></div>`;
      }
    }
  }}
  document.getElementById('lscroll').innerHTML=h;
}
function toggleFront(f){if(collapsed.has(f))collapsed.delete(f);else collapsed.add(f);renderList()}
function selectQ(id){sel=id;renderList();renderDetail();const el=document.querySelector('.qrow.sel');if(el)el.scrollIntoView({block:'nearest'});if(window.innerWidth<=767)closeDrawer()}
function renderDetail(){
  const el=document.getElementById('detail');
  if(!sel){el.innerHTML='<div class="no-sel"><div class="no-sel-orn">✦</div>Select a quest to begin</div>';return}
  const q=st.quests.find(x=>x.id===sel);
  if(!q){el.innerHTML='<div class="no-sel"><div class="no-sel-orn">✦</div>Select a quest to begin</div>';return}
  const days=daysUntil(q.due);let dueChip='';
  if(q.due){let cls='',lbl='';if(days<0){cls='ov';lbl=`Overdue by ${-days} days`}else if(days===0){cls='soon';lbl='Due Today!'}else if(days===1){cls='soon';lbl='Due Tomorrow'}else if(days<=7){cls='soon';lbl=`Due in ${days} days — ${fmt(q.due)}`}else lbl=`${fmt(q.due)} — ${days} days`;dueChip=`<div class="d-due-chip ${cls}">📅 ${lbl}</div>`}
  const sdone=q.objectives.filter(s=>s.d).length,stotal=q.objectives.length;
  const frontOpts=st.fronts.map(f=>`<option value="${f}"${f===q.front?' selected':''}>${f}</option>`).join('');
  const missionOpts=st.missions.map(m=>`<option value="${m}"${m===q.mission?' selected':''}>${m}</option>`).join('');
  const prioOpts=['critical','high','medium','low'].map(p=>`<option value="${p}"${p===q.priority?' selected':''}>${PNAMES[p]}</option>`).join('');
  el.innerHTML=`
    <button class="back-btn" onclick="goBack()">← Quests</button>
    <div class="d-title-bar">
      <input class="d-edit-field" style="text-align:center;font-family:'Cinzel',serif;font-size:1.1rem;font-weight:600;color:var(--s0);width:100%;background:transparent;border-color:transparent;letter-spacing:.04em"
        value="${q.name.replace(/"/g,'&quot;')}" onchange="editField(${q.id},'name',this.value)"
        onfocus="this.style.borderColor='var(--border)'" onblur="this.style.borderColor='transparent'">
    </div>
    <div class="d-meta">
      <div class="d-meta-item"><span class="d-meta-label">Priority</span><div class="pips" style="margin:0 2px">${pipHtml(q.priority,9)}</div><select class="d-edit-select" onchange="editField(${q.id},'priority',this.value)">${prioOpts}</select></div>
      <div class="d-meta-item"><span class="d-meta-label">Front</span><select class="d-edit-select" onchange="editField(${q.id},'front',this.value)">${frontOpts}</select></div>
      <div class="d-meta-item"><span class="d-meta-label">Mission</span><select class="d-edit-select" onchange="editField(${q.id},'mission',this.value)">${missionOpts}</select></div>
      <div class="d-meta-item"><span class="d-meta-label">Due</span><input type="date" class="d-edit-field" value="${q.due||''}" onchange="editField(${q.id},'due',this.value)" style="font-size:.82rem;padding:3px 7px"></div>
      ${dueChip}${stotal?`<div class="d-meta-item"><span class="d-meta-label">Objectives</span>${sdone}/${stotal}</div>`:''}
    </div>
    <hr class="sep"><span class="d-sec-label">Notes</span>
    <textarea class="d-textarea" id="d-ta" placeholder="Details, links, notes..." onchange="saveContent(${q.id})">${q.content||''}</textarea>
    <hr class="sep"><span class="d-sec-label">Objectives</span>
    <div class="obj-list">${q.objectives.map((o,i)=>`<div class="obj-row${o.d?' done-o':''}"><div class="obj-check${o.d?' chk':''}" onclick="toggleObj(${q.id},${i})"></div><span class="obj-text" style="flex:1">${o.t}</span><button style="background:none;border:none;cursor:pointer;color:var(--s4);font-size:.8rem;padding:0 4px;min-width:30px;min-height:30px" onclick="delObj(${q.id},${i})">✕</button></div>`).join('')}</div>
    <div class="add-obj-row"><input class="add-obj-inp" type="text" id="new-obj" placeholder="Add objective..." onkeydown="if(event.key==='Enter')addObj(${q.id})"><button class="btn-addobj" onclick="addObj(${q.id})">+ Add</button></div>
    <div class="d-actions">
      ${q.done?`<button class="a-btn a-reopen" onclick="toggleComplete(${q.id})">↩ Reopen Quest</button>`:`<button class="a-btn a-complete" onclick="toggleComplete(${q.id})">✓ Complete Quest</button>`}
      <button class="a-btn a-del" onclick="delQ(${q.id})">✕ Delete</button>
    </div>`;
}
function editField(id,field,val){const q=st.quests.find(x=>x.id===id);if(!q)return;q[field]=val;save();renderGems();renderList();if(field==='priority'||field==='due'){const p=document.querySelector('.pips');if(p)p.innerHTML=pipHtml(q.priority,9);const c=document.querySelector('.d-due-chip');if(c||q.due)renderDetail()}}
function saveContent(id){const q=st.quests.find(x=>x.id===id);if(q){q.content=document.getElementById('d-ta').value;save()}}
function toggleComplete(id){const q=st.quests.find(x=>x.id===id);if(q){q.done=!q.done;render()}}
function toggleObj(qid,i){const q=st.quests.find(x=>x.id===qid);if(q){q.objectives[i].d=!q.objectives[i].d;save();renderDetail()}}
function delObj(qid,i){const q=st.quests.find(x=>x.id===qid);if(q){q.objectives.splice(i,1);save();renderDetail()}}
function addObj(qid){const el=document.getElementById('new-obj');const v=el.value.trim();if(!v)return;const q=st.quests.find(x=>x.id===qid);if(q){q.objectives.push({t:v,d:false});el.value='';save();renderDetail()}}
function delQ(id){st.quests=st.quests.filter(x=>x.id!==id);sel=null;render()}
function populateSelects(){const ff=document.getElementById('ffront'),fm=document.getElementById('fmission');const cf=ff.value,cm=fm.value;ff.innerHTML=st.fronts.map(f=>`<option value="${f}"${f===cf?' selected':''}>${f}</option>`).join('');fm.innerHTML=st.missions.map(m=>`<option value="${m}"${m===cm?' selected':''}>${m}</option>`).join('')}
function toggleForm(){formOpen=!formOpen;document.getElementById('dform').classList.toggle('open',formOpen)}
function cancelForm(){formOpen=false;document.getElementById('dform').classList.remove('open');document.getElementById('fn').value='';document.getElementById('fdue').value=''}
function submitQuest(){const name=document.getElementById('fn').value.trim();if(!name){document.getElementById('fn').focus();return}const q={id:st.nextId++,name,front:document.getElementById('ffront').value,mission:document.getElementById('fmission').value,priority:document.getElementById('fprio').value,due:document.getElementById('fdue').value,content:'',done:false,objectives:[]};st.quests.unshift(q);sel=q.id;cancelForm();render()}
function openModal(){document.getElementById('modal-wrap').classList.add('open');renderModal()}
function closeModal(){document.getElementById('modal-wrap').classList.remove('open')}
function switchTab(t){modalTab=t;document.querySelectorAll('.modal-tab').forEach((el,i)=>el.classList.toggle('active',['fronts','missions'][i]===t));renderModal()}
function renderModal(){const items=modalTab==='fronts'?st.fronts:st.missions;const label=modalTab==='fronts'?'New Front':'New Mission';const ph=modalTab==='fronts'?'Front name...':'Mission name...';document.getElementById('modal-body').innerHTML=`<div class="manage-list">${items.map((it,i)=>`<div class="manage-item"><span class="manage-item-name">${it}</span><button class="manage-del" onclick="removeItem(${i})">✕</button></div>`).join('')}</div><div class="manage-add-row"><input type="text" id="new-item" placeholder="${ph}" onkeydown="if(event.key==='Enter')addItem()"><button class="btn-madd" onclick="addItem()">+ ${label}</button></div>`}
function addItem(){const el=document.getElementById('new-item');const v=el.value.trim();if(!v)return;if(modalTab==='fronts'){if(!st.fronts.includes(v))st.fronts.push(v)}else{if(!st.missions.includes(v))st.missions.push(v)}el.value='';save();renderModal();populateSelects()}
function removeItem(i){if(modalTab==='fronts')st.fronts.splice(i,1);else st.missions.splice(i,1);save();renderModal();populateSelects()}
render();
initFirebase();
</script>
